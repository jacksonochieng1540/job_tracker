<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Application Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6fa; }
        .navbar-brand { font-weight: 600; }
        .kanban-column { min-height: 60vh; }
        .app-card { cursor: pointer; }
        .app-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .score-badge { font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">📋 Job Tracker</a>
            {% if user.is_authenticated %}
            <div class="d-flex align-items-center">
                <a href="{% url 'application-create' %}" class="btn btn-primary btn-sm me-2">+ New Application</a>
                <a href="{% url 'resume-list' %}" class="btn btn-outline-light btn-sm me-3">My Resumes</a>
                <span class="text-light me-3">{{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
